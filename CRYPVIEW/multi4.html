<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      (function () {
        var saved = localStorage.getItem('crypview-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'light' || (!saved && !prefersDark)) {
          document.documentElement.classList.add('light-theme');
        }
      })();
    </script>
    <title>Multi-Charts 4 — CrypView</title>
    <meta name="description" content="Grille 2×2 de 4 graphiques crypto indépendants — symboles, timeframes et indicateurs personnalisés. Données live Binance.">
    <meta name="robots" content="noindex, follow">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://crypview.betacapital.enterprise/multi4.html">
    <meta property="og:title"       content="CrypView — Multi-Charts 4 Paires (2×2)">
    <meta property="og:description" content="Analyse comparative multi-paires en temps réel.">
    <meta property="og:image"       content="/og-image.svg">
    <meta property="og:image:type"  content="image/svg+xml">
    <meta property="og:image:width"  content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale"      content="fr_FR">
    <meta property="og:site_name"   content="CrypView">
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
    <!-- ✅ 1.3 — Icônes PNG générées par generate-icons.mjs -->
    <link rel="apple-touch-icon"             href="public/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="public/icons/apple-touch-icon.png">
    <link rel="manifest" href="public/manifest.json">
    <meta name="theme-color" content="#070a0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CrypView">
    <meta name="msapplication-TileImage" content="public/icons/icon-192.png">
    <meta name="msapplication-TileColor" content="#070a0f">

    <!--
      Import map — requis quand le projet est servi sans bundler
      (npx serve, serveur statique, etc.). Vite prend la priorité
      sur cet import map lors du dev/build et résout depuis node_modules.
    -->
    <script type="importmap">
    {
      "imports": {
        "lightweight-charts": "https://esm.sh/lightweight-charts@4.1.3"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/charts.css">
    <link rel="stylesheet" href="styles/multi.css">
  </head>
<body>

<header role="banner">
  <a class="logo" href="index.html" aria-label="CrypView — Accueil"><span>CRYP</span>VIEW</a>
  <div class="badge-multi" aria-label="Mode Multi 4 graphiques">🔲 MULTI 4</div>
  <div id="compare-label" aria-live="polite" aria-label="Paires comparées"></div>
  <div class="status" role="status" aria-live="polite">
    <div class="dot" id="dot" aria-hidden="true"></div>
    <span id="status-text">Connexion…</span>
  </div>
  <button class="btn-disable" id="btn-back" aria-label="Retourner à la vue simple">✕ Désactiver Multi-graphiques</button>
</header>

<div class="multi-grid multi-grid-4" id="multi-grid" role="main" aria-label="Grille de 4 graphiques"></div>


<script type="module" src="src/pages/multi4.js"></script>
</body>
</html>
