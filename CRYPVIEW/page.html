<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ⚡ ANTI-FLASH : AVANT tout CSS -->
    <script>
      (function () {
        var saved = localStorage.getItem('crypview-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'light' || (!saved && !prefersDark)) {
          document.documentElement.classList.add('light-theme');
        }
      })();
    </script>

    <title>CrypView — Vue Unique</title>
    <meta name="description"
          content="Graphiques crypto en temps réel (1s à 1M) avec 19 indicateurs avancés, Footprint, Orderflow et Drawing Tools. Données live Binance WebSocket.">
    <meta name="robots" content="noindex, follow">

    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://crypview.betacapital.enterprise/page.html">
    <meta property="og:title"       content="CrypView — Un outil d'analyse Technique Crypto OPEN-SOURCE">
    <meta property="og:description" content="CRYPVIEW est une plateforme d’analyse crypto en temps réel permettant de visualiser, comparer et analyser les marchés via des graphiques connectés à Binance.">
    <meta property="og:image" content="https://ezilryb.github.io/CRYPVIEW/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width"  content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt"   content="CrypView — interface de trading avec chandeliers et indicateurs">
    <meta property="og:locale"      content="fr_FR">
    <meta property="og:site_name"   content="CrypView">

    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:site"        content="@BetaCapital">
    <meta name="twitter:title"       content="CrypView — Un outil d'analyse Technique Crypto OPEN-SOURCE">
    <meta name="twitter:description" content="CRYPVIEW est une plateforme d’analyse crypto en temps réel permettant de visualiser, comparer et analyser les marchés via des graphiques connectés à Binance.">
    <meta name="twitter:image" content="https://ezilryb.github.io/CRYPVIEW/og-image.png">
    <meta name="twitter:image:alt"   content="CrypView — interface de trading">

    <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
    <link rel="apple-touch-icon"             href="public/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="public/icons/apple-touch-icon.png">

    <link rel="manifest" href="public/manifest.json">
    <meta name="theme-color" content="#070a0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="mobile-web-app-capable"            content="yes">
    <meta name="apple-mobile-web-app-capable"      content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title"        content="CrypView">
    <meta name="msapplication-TileImage"           content="public/icons/icon-192.png">
    <meta name="msapplication-TileColor"           content="#070a0f">
    <meta name="msapplication-config"              content="public/browserconfig.xml">

    <!--
      Import map — requis quand le projet est servi sans bundler
      (npx serve, serveur statique, etc.). Vite prend la priorité
      sur cet import map lors du dev/build et résout depuis node_modules.
    -->
    <script type="importmap">
    {
      "imports": {
        "lightweight-charts": "https://esm.sh/lightweight-charts@4.1.3"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/charts.css">
    <link rel="stylesheet" href="styles/mobile-charts.css">
  </head>
<body>

  <a href="#main-content" class="sr-only">Aller au contenu principal</a>

  <header role="banner">
    <a class="logo" href="index.html" aria-label="CrypView — Accueil"><span>CRYP</span>VIEW</a>
    <div class="sym-search-wrap">
      <input id="sym-input" type="text" placeholder="Rechercher BTC..."
             data-i18n-ph="search.placeholder"
             autocomplete="off" spellcheck="false" aria-label="Recherche de symbole">
      <span class="sym-search-icon" aria-hidden="true">⌕</span>
      <div id="sym-dropdown" role="listbox" aria-label="Résultats de recherche"></div>
    </div>
    <div class="tf-scroll-wrapper" role="group" aria-label="Sélection du timeframe">
      <div class="tf-scroll" id="tf-scroll"></div>
    </div>
    <div class="price-display">
      <div id="live-price" aria-live="polite" aria-label="Prix actuel">—</div>
      <div id="price-change" aria-live="polite"></div>
    </div>
    <div class="status" role="status" aria-live="polite">
      <div class="dot" id="dot" aria-hidden="true"></div>
      <span id="status-text">Connexion…</span>
    </div>
  </header>

  <div class="err-banner" id="err-banner" role="alert" aria-live="assertive"></div>
  <div id="ind-bar" aria-label="Indicateurs actifs"></div>

  <main class="main" id="main-content">
    <div class="charts-col" id="charts-col">
      <div id="chart-container" style="position:relative;">
        <div id="overlay">
          <div id="overlay-msg">⏳ Chargement…</div>
          <div id="overlay-sub">Connexion à Binance</div>
        </div>
        <div id="fp-legend" aria-hidden="true">
          <div><span class="fp-l-ask">▪ Ask (achat)</span> &nbsp; <span class="fp-l-bid">▪ Bid (vente)</span></div>
          <div><span class="fp-l-imb">★ Imbalance ≥ 3×</span></div>
        </div>
        <div id="draw-canvas" class="draw-canvas" aria-hidden="true">
          <svg id="draw-svg"></svg>
        </div>
      </div>
    </div>
    <aside class="sidebar" aria-label="Informations du marché">
      <div class="sidebar-title" data-i18n="sidebar.stats24h">Stats 24h</div>
      <div class="stats">
        <div class="stat"><div class="stat-label" data-i18n="sidebar.open">Ouverture</div><div class="stat-value" id="s-open">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="sidebar.high">Haut</div><div class="stat-value" id="s-high" style="color:var(--green)">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="sidebar.low">Bas</div><div class="stat-value"  id="s-low"  style="color:var(--red)">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="sidebar.volume">Volume</div><div class="stat-value" id="s-vol">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="sidebar.trades">Trades</div><div class="stat-value" id="s-tr">—</div></div>
      </div>
      <div class="sidebar-title" data-i18n="sidebar.recentTrades">Trades récents</div>
      <div class="trades-header">
        <span data-i18n="sidebar.price">Prix</span>
        <span style="text-align:right" data-i18n="sidebar.qty">Qté</span>
        <span style="text-align:right" data-i18n="sidebar.time">H.</span>
      </div>
      <div class="trades-list" id="trades" aria-live="polite" aria-label="Derniers trades"></div>
    </aside>
  </main>

  <!-- ── Menu contextuel ───────────────────────────────────── -->

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script type="module" src="src/pages/page.js"></script>

</body>
</html>
