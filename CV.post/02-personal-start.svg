<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#00ff88" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <pattern id="scan" width="1080" height="4" patternUnits="userSpaceOnUse">
      <rect width="1080" height="2" fill="#00ff88" opacity="0.008"/>
    </pattern>
    <filter id="gg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#00c8ff" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="go" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#ff9900" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#e040fb" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gr" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#ff3d5a" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-o" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e040fb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#070a0f"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>
  <rect width="1080" height="1080" fill="url(#scan)"/>
  <ellipse cx="200" cy="540" rx="400" ry="400" fill="url(#orb-c)" opacity="0.5"/>
  <ellipse cx="900" cy="300" rx="300" ry="300" fill="url(#orb-g)" opacity="0.4"/>
  <path d="M60 115 L60 60 L115 60" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M965 60 L1020 60 L1020 115" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M60 965 L60 1020 L115 1020" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.2"/>
  <path d="M965 1020 L1020 1020 L1020 965" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.2"/>
  <text x="64" y="104" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="20" font-weight="800" letter-spacing="3" fill="#8b949e">CRYP<tspan fill="#00ff88">VIEW</tspan></text>
  <rect x="770" y="75" width="174.0" height="22" rx="2" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <text x="782" y="90" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#00ff88" letter-spacing="1.5" opacity="0.8">HISTOIRE PERSONNELLE</text>
  <line x1="64" y1="130" x2="1016" y2="130" stroke="#1c2333" stroke-width="1"/>
  <!-- Big date -->
  <text x="64" y="310" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#00c8ff" letter-spacing="4" opacity="0.8">06 MARS 2026</text>
  <text x="64" y="420" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="80" font-weight="800" fill="#e6edf3">Premier</text>
  <text x="64" y="510" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="80" font-weight="800" fill="#00c8ff" filter="url(#gc)">commit.</text>
  <rect x="64" y="540" width="60" height="3" fill="#00c8ff" rx="1"/>
  <text x="64" y="610" font-family="'Space Mono', 'Courier New', monospace" font-size="18" fill="#8b949e">Ce projet a commencé par</text>
  <text x="64" y="638" font-family="'Space Mono', 'Courier New', monospace" font-size="18" fill="#e6edf3">une idée simple :</text>
  <text x="64" y="690" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="#00ff88">« voir les marchés autrement. »</text>
  <!-- Timeline dots -->
  <circle cx="64" cy="780" r="6" fill="#00c8ff"/>
  <line x1="70" y1="780" x2="200" y2="780" stroke="#1c2333" stroke-width="1"/>
  <circle cx="200" cy="780" r="4" fill="#1c2333"/>
  <line x1="206" y1="780" x2="460" y2="780" stroke="#1c2333" stroke-width="1" stroke-dasharray="4 4"/>
  <circle cx="460" cy="780" r="6" fill="#00ff88"/>
  <line x1="466" y1="780" x2="1016" y2="780" stroke="#1c2333" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  <text x="55" y="810" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#00c8ff" opacity="0.8">06 MARS</text>
  <text x="185" y="810" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#8b949e" opacity="0.6">...</text>
  <text x="435" y="810" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#00ff88">AVRIL 2026</text>
  <!-- Commit lines -->
  <text x="164" y="800" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#2d3748" opacity="0.6">$ git log --oneline | wc -l</text>
  <text x="64" y="908" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="52" font-weight="800" fill="#00ff88" filter="url(#gg)">70+</text>
  <text x="130" y="920" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#8b949e"> commits</text>
  <line x1="60" y1="1028" x2="1020" y2="1028" stroke="#1c2333" stroke-width="1"/>
  <text x="540" y="1052" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#2d3748" text-anchor="middle" letter-spacing="2" opacity="0.7">crypview.betacapital.enterprise</text>
</svg>