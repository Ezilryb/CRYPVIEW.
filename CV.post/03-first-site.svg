  <text x="64" y="832" dx="20" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#00ff88">✓ Deployed to GitHub Pages</text>
  <text x="64" y="856" dx="20" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#2d3748">https://crypview.betacapital.enterprise</text>
  <line x1="60" y1="1028" x2="1020" y2="1028" stroke="#1c2333" stroke-width="1"/>
  <text x="540" y="1052" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#2d3748" text-anchor="middle" letter-spacing="2" opacity="0.7">crypview.betacapital.enterprise</text>
</svg>