<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#00ff88" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <pattern id="scan" width="1080" height="4" patternUnits="userSpaceOnUse">
      <rect width="1080" height="2" fill="#00ff88" opacity="0.008"/>
