  <text x="300" y="866" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="1">MOIS SOLO</text>
  <text x="500" y="866" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#8b949e" letter-spacing="1">PREMIER SITE</text>
  <text x="64" y="930" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#2d3748">Commencé le 6 Mars 2026 · Déployé Avril 2026</text>
  <line x1="60" y1="1028" x2="1020" y2="1028" stroke="#1c2333" stroke-width="1"/>
  <text x="540" y="1052" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#2d3748" text-anchor="middle" letter-spacing="2" opacity="0.7">crypview.betacapital.enterprise</text>
