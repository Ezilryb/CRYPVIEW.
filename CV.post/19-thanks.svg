  <line x1="64" y1="130" x2="1016" y2="130" stroke="#1c2333" stroke-width="1"/>
  <text x="64" y="310" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#e040fb" letter-spacing="3">UN PROJET PERSONNEL</text>
  <text x="64" y="430" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="88" font-weight="800" fill="#e6edf3">Ce n'est</text>
  <text x="64" y="525" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="88" font-weight="800" fill="#e6edf3">que le</text>
  <text x="64" y="618" font-family="'Syne', 'Arial Black', 'Helvetica Neue', sans-serif" font-size="88" font-weight="800" fill="#e040fb" filter="url(#gp)">début.</text>
  <rect x="64" y="648" width="60" height="3" fill="#e040fb" rx="1"/>
  <text x="64" y="718" font-family="'Space Mono', 'Courier New', monospace" font-size="17" fill="#8b949e">Premier site. Beaucoup appris.</text>
  <text x="64" y="746" font-family="'Space Mono', 'Courier New', monospace" font-size="17" fill="#8b949e">Merci à ceux qui testeront. 🙏</text>
