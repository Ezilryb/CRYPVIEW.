  <text x="84" y="732" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#00ff88">const stack = {</text>
  <text x="84" y="764" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#e6edf3">  lang: <tspan fill="#f7c948">'Vanilla ES2022+'</tspan>,</text>
  <text x="84" y="796" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#e6edf3">  bundler: <tspan fill="#f7c948">'Vite 5'</tspan>,</text>
  <text x="84" y="828" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#e6edf3">  charts: <tspan fill="#f7c948">'LightweightCharts 4.1'</tspan>,</text>
  <text x="84" y="860" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#e6edf3">  data: <tspan fill="#f7c948">'Binance WebSocket API'</tspan>,</text>
  <text x="84" y="892" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#00ff88">}</text>
