  <text x="90" y="1332" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">Import dynamique des locales i18n</text>  <rect x="64" y="1352" width="952" height="66" rx="4" fill="#0d1117" stroke="#1c2333" stroke-width="1"/>
  <rect x="64" y="1352" width="4" height="66" fill="#f7c948" rx="2"/>
  <text x="90" y="1390" font-family="'Space Mono', 'Courier New', monospace" font-size="15" fill="#e6edf3">Service Worker — Cache PWA</text>
