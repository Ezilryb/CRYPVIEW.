  <rect x="64" y="1196" width="4" height="66" fill="#e040fb" rx="2"/>
  <text x="90" y="1234" font-family="'Space Mono', 'Courier New', monospace" font-size="15" fill="#e6edf3">localStorage + BroadcastChannel</text>
  <text x="90" y="1254" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">Persistance et sync cross-tabs des alertes</text>  <rect x="64" y="1274" width="952" height="66" rx="4" fill="#0d1117" stroke="#1c2333" stroke-width="1"/>
  <rect x="64" y="1274" width="4" height="66" fill="#ff9900" rx="2"/>
