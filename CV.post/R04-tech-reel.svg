  <text x="90" y="1078" font-family="'Space Mono', 'Courier New', monospace" font-size="15" fill="#e6edf3">WSPool — Déduplication WebSocket</text>
  <text x="90" y="1098" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">200 streams/conn. • 5 conn. max • Backoff exp.</text>  <rect x="64" y="1118" width="952" height="66" rx="4" fill="#0d1117" stroke="#1c2333" stroke-width="1"/>
  <rect x="64" y="1118" width="4" height="66" fill="#00c8ff" rx="2"/>
